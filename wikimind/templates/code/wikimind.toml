[project]
name = "{{PROJECT_NAME}}"
template = "code"

[paths]
raw = ".wiki/raw/"
wiki = ".wiki/vault/"

[llm]
provider = "anthropic"  # anthropic | openai | ollama
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"
# base_url = ""
# max_tokens_per_call = 8192
# max_budget_usd = 5.0  # Uncomment to set a per-session spending cap

[wiki]
required_frontmatter = ["title", "type", "tags", "created", "updated"]
retrieval_backend = "qmd"   # qmd (default) | bm25 | index_keyword
# ↑ Uses qmd vsearch (vector/semantic search). Falls back to bm25 automatically if qmd is not installed.
#   One-time setup: npm install -g @tobilu/qmd  →  qmd collection add .wiki/vault/ --name <project>  →  qmd embed
qmd_mode = "vsearch"        # vsearch (vector) | query (hybrid, best quality) | search (BM25 only)
# qmd_bin = "qmd"           # full path to qmd binary if not on PATH

[wiki.categories]
modules = "Source files, classes, functions, components"
apis = "API documentation overview: endpoints, request/response shapes, examples, summaries"
"apis/api-detail" = "API detail: business flow, business logic deep-dives, API layer internals"
patterns = "Design patterns, architectural decisions, conventions"
decisions = "Architecture Decision Records (ADRs)"
diagrams = "All diagrams: Mermaid, UML, PlantUML, draw.io, etc."
"diagrams/apis" = "Diagrams specific to API flows and contracts"
sources = "One summary per raw source"
analyses = "Saved queries, comparisons, syntheses"
